services:
  dns-cache:
    restart: unless-stopped
    image: coredns/coredns:latest
    command:
      - -conf
      - /etc/coredns/Corefile
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 9.9.9.9
    volumes:
      - ./coredns/Corefile:/etc/coredns/Corefile:ro
    networks:
      sipist-workspace-network:
        ipv4_address: 172.28.0.53

  notebook:
    container_name: notebook
    restart: unless-stopped
    image: quay.io/sipist/notebook:latest
    depends_on:
      - dns-cache
    volumes:
      - ./.ir_datasets:/home/jovyan/.ir_datasets
      - ./work:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./images:/home/jovyan/images
    environment:
      - JUPYTER_PORT=10000
    dns:
      - 172.28.0.53
    ports:
      - 10000:10000
    networks:
      - sipist-workspace-network

networks:
  sipist-workspace-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
